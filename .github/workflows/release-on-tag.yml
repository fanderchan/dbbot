name: Publish managed release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build curated release package
        id: package
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_PACKAGE_DIR: ${{ runner.temp }}/dbbot-release
        run: |
          asset_path="$(bash .github/scripts/build-release-package.sh "$RELEASE_TAG" "$RELEASE_PACKAGE_DIR")"
          echo "asset_path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Render managed release body
        id: body
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_BODY_PATH: ${{ runner.temp }}/dbbot-release/release-body.md
        with:
          script: |
            const fs = require("fs");
            const {
              buildManagedBody,
              isPrerelease,
            } = require("./.github/scripts/release-manager.cjs");
            const tag = process.env.RELEASE_TAG;
            const body = await buildManagedBody(github, context.repo.owner, context.repo.repo, tag);
            fs.writeFileSync(process.env.RELEASE_BODY_PATH, body);
            core.setOutput("body_path", process.env.RELEASE_BODY_PATH);
            core.setOutput("prerelease", String(isPrerelease(tag)));

      - name: Publish release and upload curated package
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.body.outputs.body_path }}
          prerelease: ${{ steps.body.outputs.prerelease }}
          files: ${{ steps.package.outputs.asset_path }}
          fail_on_unmatched_files: true
