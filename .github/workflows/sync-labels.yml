name: Sync labels

on:
  push:
    branches:
      - main
    paths:
      - .github/labels.json
      - .github/workflows/sync-labels.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create or update labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const desired = JSON.parse(fs.readFileSync(".github/labels.json", "utf8"));
            const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner,
              repo,
              per_page: 100,
            });
            const byName = new Map(existing.map((label) => [label.name, label]));

            for (const label of desired) {
              const current = byName.get(label.name);
              if (!current) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                core.info(`Created label: ${label.name}`);
                continue;
              }

              if (
                current.color.toLowerCase() !== label.color.toLowerCase() ||
                (current.description || "") !== label.description
              ) {
                await github.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: current.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description,
                });
                core.info(`Updated label: ${label.name}`);
              } else {
                core.info(`Unchanged label: ${label.name}`);
              }
            }
