name: Delete release on tag delete

on:
  delete:

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.ref_type == 'tag' && startsWith(github.event.ref, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Delete release for deleted tag
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ github.event.ref }}
        with:
          script: |
            const { deleteReleaseForTag } = require("./.github/scripts/release-manager.cjs");
            await deleteReleaseForTag({
              github,
              context,
              core,
              tag: process.env.RELEASE_TAG,
            });
