# ClickHouse NFS Server Inventory（NFS 服务端专用）
# 说明：
# 1) 仅用于 setup_nfs_server.yml
# 2) 公开仓库示例使用 RFC 5737 文档专用地址，请替换为你的真实环境。

[clickhouse_nfs_server]
nfs-example ansible_host=192.0.2.20

[all:vars]
dbbot_inventory_purpose=nfs_server
ansible_python_interpreter=auto_silent
ansible_user=root
ansible_ssh_pass="'<your_ssh_password>'"
