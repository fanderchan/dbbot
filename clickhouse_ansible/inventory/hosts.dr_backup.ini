# ClickHouse Backup Inventory（备份专用）
# 说明：
# 1) 仅保留备份所需最小字段：ansible_host / shard / replica / clickhouse_tcp_port
# 2) 不要求 instance_id / replica_name / system_hostname，适配非本仓部署的线上集群
# 3) 每行第一个字段（如 ck-131-1）是 Ansible 主机别名，仅用于标识/limit，可自行简化命名

[clickhouse_backup]
ck-dr-11-1 ansible_host=192.0.2.111 shard=1 replica=1 clickhouse_tcp_port=9000
ck-dr-11-2 ansible_host=192.0.2.111 shard=3 replica=2 clickhouse_tcp_port=9001
ck-dr-12-1 ansible_host=192.0.2.112 shard=1 replica=2 clickhouse_tcp_port=9000
ck-dr-12-2 ansible_host=192.0.2.112 shard=2 replica=1 clickhouse_tcp_port=9001
ck-dr-13-1 ansible_host=192.0.2.113 shard=2 replica=2 clickhouse_tcp_port=9000
ck-dr-13-2 ansible_host=192.0.2.113 shard=3 replica=1 clickhouse_tcp_port=9001

# 兼容旧模板/脚本：统一聚合到 clickhouse_cluster
[clickhouse_cluster:children]
clickhouse_backup

# 备份本身不依赖 zk 节点清单，保留空组以兼容旧逻辑
[zookeeper_cluster]

[all:vars]
dbbot_inventory_purpose=backup
ansible_python_interpreter=auto_silent
ansible_user=root
ansible_ssh_pass="'<your_ssh_password>'"
