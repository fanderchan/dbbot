# ClickHouse Standalone - 单机快速测试示例（多机并行）
# 公开仓库示例使用 RFC 5737 文档专用地址，请替换为你的真实环境。
[clickhouse_deploy]
ck-single-11 ansible_host=192.0.2.11 shard=1 replica=1 instance_id=1 replica_name=ck-single-11 system_hostname=ck-single-11
ck-single-12 ansible_host=192.0.2.12 shard=1 replica=1 instance_id=1 replica_name=ck-single-12 system_hostname=ck-single-12
ck-single-13 ansible_host=192.0.2.13 shard=1 replica=1 instance_id=1 replica_name=ck-single-13 system_hostname=ck-single-13

[clickhouse_cluster:children]
clickhouse_deploy

# 单机模式不需要 Zookeeper/Keeper，保留空分组以便兼容
[zookeeper_cluster]

[all:vars]
dbbot_inventory_purpose=deploy
ansible_python_interpreter=auto_silent
ansible_user=root
ansible_ssh_pass="'<your_ssh_password>'"
