# ClickHouse Deploy Inventory（部署专用）
# 说明：
# 1) 对外建议按场景拆分 inventory：deploy / backup / restore
# 2) 本文件用于部署，包含多实例部署所需的 instance_id / replica_name / system_hostname
# 3) 每行第一个字段（如 ck-131-1）是 Ansible 主机别名，仅用于标识/limit，可自行简化命名

[clickhouse_deploy]
ck-dr-11-1 ansible_host=198.51.100.11 shard=1 replica=1 instance_id=1 replica_name=ck-dr-s1-r1 system_hostname=ck-dr-node1
ck-dr-11-2 ansible_host=198.51.100.11 shard=3 replica=2 instance_id=2 replica_name=ck-dr-s3-r2 system_hostname=ck-dr-node1
ck-dr-12-1 ansible_host=198.51.100.12 shard=1 replica=2 instance_id=1 replica_name=ck-dr-s1-r2 system_hostname=ck-dr-node2
ck-dr-12-2 ansible_host=198.51.100.12 shard=2 replica=1 instance_id=2 replica_name=ck-dr-s2-r1 system_hostname=ck-dr-node2
ck-dr-13-1 ansible_host=198.51.100.13 shard=2 replica=2 instance_id=1 replica_name=ck-dr-s2-r2 system_hostname=ck-dr-node3
ck-dr-13-2 ansible_host=198.51.100.13 shard=3 replica=1 instance_id=2 replica_name=ck-dr-s3-r1 system_hostname=ck-dr-node3

# replica_name 是可选的，可以删掉不填，走自动推导
#  - 公式：ck-s<shard>-r<replica>
#  - 例子：shard=2 replica=1 -> ck-s2-r1
# instance_id：多实例部署建议显式填写（影响端口/配置目录/systemd 服务名推导）
# system_hostname：仅部署且 fcs_set_hostname=true 时有作用，dbbot 帮忙设置 hostname，默认 on
#  - 若生产已有主机名治理，不希望剧本改 hostname，请在 vars/common_config.yml 设置 fcs_set_hostname=false

# 兼容旧模板/脚本：统一聚合到 clickhouse_cluster
[clickhouse_cluster:children]
clickhouse_deploy

[zookeeper_deploy]
ck-dr-11-1 zk_id=1
ck-dr-12-1 zk_id=2
ck-dr-13-1 zk_id=3


# 兼容旧模板/脚本：统一聚合到 zookeeper_cluster
[zookeeper_cluster:children]
zookeeper_deploy

[all:vars]
dbbot_inventory_purpose=deploy
ansible_python_interpreter=auto_silent
ansible_user=root
ansible_ssh_pass="'<your_ssh_password>'"
