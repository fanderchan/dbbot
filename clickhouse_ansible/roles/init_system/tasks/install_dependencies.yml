- name: Select package-manager helper dependency for RedHat family
  ansible.builtin.set_fact:
    clickhouse_redhat_helper_package: "{{ 'dnf-plugins-core' if ansible_distribution == 'openEuler' else 'yum-utils' }}"
  when: ansible_os_family == "RedHat"

- name: Install ClickHouse dependencies (RedHat family)
  ansible.builtin.yum:
    name:
      - "{{ clickhouse_redhat_helper_package }}"
      - libtool
      - unixODBC
      - unixODBC-devel
    state: present
    use_backend: auto
  when: ansible_os_family == "RedHat"

- name: Install ClickHouse dependencies (Debian family)
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - libtool
      - unixodbc
      - unixodbc-dev
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"
