# Zookeeper/Keeper 配置默认值
keeper_tcp_port: "{{ keeper_port | default(9181) }}"
keeper_raft_port: 9234
keeper_log_storage_path: "/opt/clickhouse/coordination/log"
keeper_snapshot_storage_path: "/opt/clickhouse/coordination/snapshots"

# Keeper 配置参数
keeper_operation_timeout_ms: 10000
keeper_session_timeout_ms: 30000
keeper_raft_logs_level: "trace"

# Standalone Zookeeper 默认配置
zookeeper_user: zookeeper
zookeeper_group: zookeeper
zookeeper_install_base: /opt/zookeeper
zookeeper_version_dir: "{{ zookeeper_install_base }}/apache-zookeeper-{{ zookeeper_version }}-bin"
zookeeper_home: "{{ zookeeper_install_base }}/current"
zookeeper_package_name: "apache-zookeeper-{{ zookeeper_version }}-bin.tar.gz"
zookeeper_download_url: "https://archive.apache.org/dist/zookeeper/zookeeper-{{ zookeeper_version }}/apache-zookeeper-{{ zookeeper_version }}-bin.tar.gz"
zookeeper_data_dir: /opt/zookeeper/data
zookeeper_log_dir: /opt/zookeeper/log
zookeeper_client_port: "{{ zookeeper_port | default(2181) }}"
zookeeper_peer_port: 2888
zookeeper_election_port: 3888
zookeeper_tick_time: 2000
zookeeper_init_limit: 10
zookeeper_sync_limit: 5
zookeeper_max_client_cnxns: 60
zookeeper_autopurge_snap_retain_count: 10
zookeeper_autopurge_purge_interval: 24

# Java 安装配置（Zookeeper 需要）
zookeeper_java_mode: "auto"  # auto|package|tarball
zookeeper_java_install_base: /opt/java
zookeeper_java_home: ""  # tarball 安装时会设置为 {{ zookeeper_java_install_base }}/current
zookeeper_java_packages_dir: "{{ zookeeper_packages_dir }}"
zookeeper_java_tarball_name: "OpenJDK11U-jre_x64_linux_hotspot.tar.gz"
zookeeper_java_download_url: "auto"  # auto: resolve latest from GitHub API
zookeeper_java_asset_prefix: "OpenJDK11U-jre_x64_linux_hotspot"
