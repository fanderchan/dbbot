---
- name: Deploy Zookeeper Cluster (standalone)
  hosts: zookeeper_deploy:zookeeper_cluster
  become: true
  any_errors_fatal: true
  vars_files:
    - vars/common_config.yml
  pre_tasks:
    - name: Validate deploy inventory purpose guard (run once)
      ansible.builtin.assert:
        that:
          - not deploy_require_inventory_guard | bool or ((dbbot_inventory_purpose | default('') | lower) == (deploy_inventory_purpose | lower))
        fail_msg: >-
          deploy_cluster.yml requires deploy inventory by default.
          current_inventory={{ inventory_file | default('unknown') }},
          dbbot_inventory_purpose={{ dbbot_inventory_purpose | default('unset') }},
          expected={{ deploy_inventory_purpose }}.
          Please use inventory/hosts.deploy.ini or set deploy_require_inventory_guard=false.
      run_once: true

    - name: Set effective deploy confirmation phrase (run once)
      ansible.builtin.set_fact:
        deploy_confirm_phrase_effective: >-
          {{
            deploy_confirm_phrase
            if (deploy_confirm_phrase | default('') | trim | length > 0)
            else ('DEPLOY ' ~ clickhouse_cluster_name)
          }}
      run_once: true

    - name: Manual confirmation before cluster deploy (run once)
      ansible.builtin.pause:
        prompt: |-
          [MANUAL CONFIRM REQUIRED]
          playbook=deploy_cluster.yml
          inventory={{ inventory_file | default('unknown') }}
          target_groups=zookeeper_deploy|zookeeper_cluster,clickhouse_deploy|clickhouse_cluster
          Type exactly "{{ deploy_confirm_phrase_effective }}" to continue:
      register: deploy_manual_confirm_input
      delegate_to: localhost
      become: false
      when: deploy_require_manual_confirm | bool
      run_once: true

    - name: Validate deploy confirmation phrase (run once)
      ansible.builtin.assert:
        that:
          - (deploy_manual_confirm_input.user_input | default('') | trim) == (deploy_confirm_phrase_effective | trim)
        fail_msg: >-
          Manual confirmation failed.
          Expected: {{ deploy_confirm_phrase_effective }}
      when: deploy_require_manual_confirm | bool
      run_once: true

    - name: Mark deploy confirmation as completed (run once)
      ansible.builtin.set_fact:
        deploy_manual_confirm_ok: true
      delegate_to: localhost
      delegate_facts: true
      when: deploy_require_manual_confirm | bool
      run_once: true

    - name: Import tasks to check OS and Python
      ansible.builtin.import_tasks: pre_tasks/check_os_and_python.yml
  tasks:
    - name: Deploy standalone Zookeeper
      ansible.builtin.include_role:
        name: "../roles/deploy_zookeeper"
      when: not use_clickhouse_keeper | bool

- name: Deploy ClickHouse Cluster (3 shards, 2 replicas)
  hosts: clickhouse_deploy:clickhouse_cluster
  become: true
  any_errors_fatal: true
  serial: "{{ clickhouse_serial | default('100%') }}"
  vars_files:
    - vars/common_config.yml
    - vars/cluster_config.yml
  vars:
    roles_to_execute:
      - "../roles/init_system"
      - "../roles/deploy_clickhouse"
  pre_tasks:
    - name: Validate deploy inventory purpose guard (fallback, run once)
      ansible.builtin.assert:
        that:
          - not deploy_require_inventory_guard | bool or ((dbbot_inventory_purpose | default('') | lower) == (deploy_inventory_purpose | lower))
        fail_msg: >-
          deploy_cluster.yml requires deploy inventory by default.
          current_inventory={{ inventory_file | default('unknown') }},
          dbbot_inventory_purpose={{ dbbot_inventory_purpose | default('unset') }},
          expected={{ deploy_inventory_purpose }}.
          Please use inventory/hosts.deploy.ini or set deploy_require_inventory_guard=false.
      run_once: true

    - name: Import tasks to validate common configuration
      ansible.builtin.import_tasks: pre_tasks/validate_common_config_setting.yml

    - name: Set effective deploy confirmation phrase (run once)
      ansible.builtin.set_fact:
        deploy_confirm_phrase_effective: >-
          {{
            deploy_confirm_phrase
            if (deploy_confirm_phrase | default('') | trim | length > 0)
            else ('DEPLOY ' ~ clickhouse_cluster_name)
          }}
      run_once: true

    - name: Manual confirmation before ClickHouse deploy (fallback, run once)
      ansible.builtin.pause:
        prompt: |-
          [MANUAL CONFIRM REQUIRED]
          playbook=deploy_cluster.yml
          inventory={{ inventory_file | default('unknown') }}
          target_group=clickhouse_deploy|clickhouse_cluster
          Type exactly "{{ deploy_confirm_phrase_effective }}" to continue:
      register: deploy_manual_confirm_input_cluster
      delegate_to: localhost
      become: false
      when:
        - deploy_require_manual_confirm | bool
        - not (hostvars['localhost'].deploy_manual_confirm_ok | default(false) | bool)
      run_once: true

    - name: Validate deploy confirmation phrase (fallback, run once)
      ansible.builtin.assert:
        that:
          - (deploy_manual_confirm_input_cluster.user_input | default('') | trim) == (deploy_confirm_phrase_effective | trim)
        fail_msg: >-
          Manual confirmation failed.
          Expected: {{ deploy_confirm_phrase_effective }}
      when:
        - deploy_require_manual_confirm | bool
        - not (hostvars['localhost'].deploy_manual_confirm_ok | default(false) | bool)
      run_once: true

    - name: Mark deploy confirmation as completed (fallback, run once)
      ansible.builtin.set_fact:
        deploy_manual_confirm_ok: true
      delegate_to: localhost
      delegate_facts: true
      when:
        - deploy_require_manual_confirm | bool
        - not (hostvars['localhost'].deploy_manual_confirm_ok | default(false) | bool)
      run_once: true

    - name: Import tasks to parse topology
      ansible.builtin.import_tasks: pre_tasks/parse_topology.yml

    - name: Import tasks to check OS and Python
      ansible.builtin.import_tasks: pre_tasks/check_os_and_python.yml

    - name: Import tasks to check clickhouse uid/gid conflicts
      ansible.builtin.import_tasks: pre_tasks/check_clickhouse_uid_gid.yml

    - name: Import tasks to prepare packages directory
      ansible.builtin.import_tasks: pre_tasks/prepare_packages.yml

    - name: Validate cluster topology
      ansible.builtin.assert:
        that:
          - clickhouse_shard_count | int >= 1
          - clickhouse_replica_count | int >= 1
          - current_node_shard is defined
          - current_node_replica is defined
          - current_node_instance_id is defined
        fail_msg: "Invalid cluster topology configuration"
      when: inventory_hostname in groups['clickhouse_cluster'] | default([])

    - name: Validate Zookeeper/Keeper nodes
      ansible.builtin.assert:
        that:
          - zookeeper_nodes | default([]) | length > 0
        fail_msg: "zookeeper_cluster group is required for ClickHouse cluster."

  tasks:
    - name: Deploy ClickHouse by instance_id (per-host sequential, cross-host parallel)
      ansible.builtin.include_tasks: tasks/deploy_clickhouse_instance_tasks.yml
      loop: "{{ clickhouse_instance_ids | default([current_node_instance_id]) }}"
      loop_control:
        loop_var: ck_instance_id
