- name: Transfer sql statement to remote
  ansible.builtin.template:
    src: ../templates/create_backup_user.sql.j2
    dest: /tmp/create_backup_user.sql
    mode: '0600'
  no_log: true

- name: Create backup user
  ansible.builtin.shell: >
    {{ mysql_software_dir }}/bin/mysql -hlocalhost -u{{ mysql_admin_user }} -S {{ socket }} < /tmp/create_backup_user.sql
  environment:
    MYSQL_PWD: "{{ mysql_admin_password }}"
  changed_when: true
  no_log: true

- name: Remove temp file /tmp/create_backup_user.sql
  ansible.builtin.file:
    dest: /tmp/create_backup_user.sql
    state: absent
