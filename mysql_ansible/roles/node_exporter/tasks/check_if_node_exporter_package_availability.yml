- name: Check if node_exporter package is available locally (dbbot server)
  ansible.builtin.stat:
    path: "{{ mysql_packages_dir }}/{{ node_exporter_package }}"
  register: node_exporter_package_stat
  run_once: true
  delegate_to: 127.0.0.1
  become: false

