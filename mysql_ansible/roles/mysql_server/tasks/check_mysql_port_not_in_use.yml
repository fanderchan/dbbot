- name: Check port not in use —— mysql port {{ mysql_port }}
  ansible.builtin.shell: set -o pipefail && if [ -z "`/usr/sbin/ss -lntp|grep ":{{ mysql_port }}"`" ] ; then echo "True"; else echo "False"; fi;
  register: mysql_server__check_mysql_port_not_in_use
  failed_when: "'True' not in mysql_server__check_mysql_port_not_in_use.stdout"
  changed_when: false
