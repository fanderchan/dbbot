- name: Install libaio and numactl
  ansible.builtin.yum:
    name: "{{ package.name }}"
    state: present
  loop:
    - { name: 'libaio' }
    - { name: 'numactl' }
  loop_control:
    loop_var: package
  tags:
    - dependents

- name: Probe libxcrypt compatibility package for MySQL 5.7
  ansible.builtin.shell: >-
    {{ ansible_pkg_mgr | default('yum') }} -q list installed libxcrypt-compat >/dev/null 2>&1
    || {{ ansible_pkg_mgr | default('yum') }} -q list available libxcrypt-compat >/dev/null 2>&1
  args:
    warn: false
  register: mysql_server__libxcrypt_compat_probe
  changed_when: false
  failed_when: false
  when:
    - db_type == 'mysql'
    - mysql_version.startswith('5.7')
  tags:
    - dependents

- name: Install libxcrypt compatibility package for MySQL 5.7
  ansible.builtin.yum:
    name: libxcrypt-compat
    state: present
  when:
    - db_type == 'mysql'
    - mysql_version.startswith('5.7')
    - mysql_server__libxcrypt_compat_probe is defined
    - mysql_server__libxcrypt_compat_probe.rc == 0
  tags:
    - dependents

- name: Clear bundled ncurses compatibility rpm fallback for MySQL 5.7 on Rocky 9
  ansible.builtin.set_fact:
    mysql_server__ncurses_compat_rpm_file: ""
  when:
    - db_type == 'mysql'
    - mysql_version.startswith('5.7')
    - os_type == 'Rocky9'
  tags:
    - dependents

- name: Install ncurses compatibility package for MySQL 5.7 on Rocky 9 from yum
  when:
    - db_type == 'mysql'
    - mysql_version.startswith('5.7')
    - os_type == 'Rocky9'
  tags:
    - dependents
  block:
    - name: Probe ncurses compatibility package for MySQL 5.7 on Rocky 9
      ansible.builtin.shell: >-
        {{ ansible_pkg_mgr | default('yum') }} -q list installed ncurses-compat-libs >/dev/null 2>&1
        || {{ ansible_pkg_mgr | default('yum') }} -q list available ncurses-compat-libs >/dev/null 2>&1
      args:
        warn: false
      register: mysql_server__ncurses_compat_probe
      changed_when: false
      failed_when: false

    - name: Install ncurses compatibility package from yum
      ansible.builtin.yum:
        name: ncurses-compat-libs
        state: present
      when: mysql_server__ncurses_compat_probe.rc == 0

  rescue:
    - name: Mark bundled ncurses compatibility rpm fallback as required
      ansible.builtin.set_fact:
        mysql_server__ncurses_compat_probe:
          rc: 1

- name: Set bundled ncurses compatibility rpm for MySQL 5.7 on Rocky 9
  ansible.builtin.set_fact:
    mysql_server__ncurses_compat_rpm_file: ncurses-compat-libs-6.2-12.20210508.el9.x86_64.rpm
  when:
    - db_type == 'mysql'
    - mysql_version.startswith('5.7')
    - os_type == 'Rocky9'
    - mysql_server__ncurses_compat_probe is defined
    - mysql_server__ncurses_compat_probe.rc != 0
  tags:
    - dependents

- name: Copy bundled ncurses compatibility rpm to Rocky 9 target
  ansible.builtin.copy:
    src: "../files/{{ mysql_server__ncurses_compat_rpm_file }}"
    dest: "/tmp/{{ mysql_server__ncurses_compat_rpm_file }}"
    mode: '0644'
  when:
    - (mysql_server__ncurses_compat_rpm_file | default('') | length) > 0
  tags:
    - dependents

- name: Install bundled ncurses compatibility rpm on Rocky 9 target
  ansible.builtin.yum:
    name: "/tmp/{{ mysql_server__ncurses_compat_rpm_file }}"
    state: present
    disable_gpg_check: true
  when:
    - (mysql_server__ncurses_compat_rpm_file | default('') | length) > 0
  tags:
    - dependents

- name: Install jemalloc
  when: fcs_mysql_use_jemalloc | bool
  tags:
    - dependents
  block:
    - name: Check whether jemalloc is already installed
      ansible.builtin.package_facts:
        manager: auto

    - name: Set jemalloc installed flag
      ansible.builtin.set_fact:
        mysql_server__jemalloc_installed: "{{ 'jemalloc' in ansible_facts.packages }}"

    - name: Check whether jemalloc is available from configured yum repositories
      ansible.builtin.yum:
        list: jemalloc
      register: mysql_server__jemalloc_repo_check
      changed_when: false
      when: not (mysql_server__jemalloc_installed | bool)

    - name: Set jemalloc repository availability flag
      ansible.builtin.set_fact:
        mysql_server__jemalloc_repo_available: >-
          {{
            (
              mysql_server__jemalloc_repo_check.results | default([])
              | selectattr('yumstate', 'equalto', 'available')
              | list
              | length
            ) > 0
          }}
      when: not (mysql_server__jemalloc_installed | bool)

    - name: Install jemalloc using yum
      ansible.builtin.yum:
        name: jemalloc
        state: present
      when:
        - not (mysql_server__jemalloc_installed | bool)
        - mysql_server__jemalloc_repo_available | bool

    - name: Set jemalloc rpm file name based on OS
      ansible.builtin.set_fact:
        mysql_server__jemalloc_rpm_file: "{{ 'jemalloc-3.6.0-1.el8.x86_64.rpm' if os_type in ['Rocky9', 'openEuler24', 'openEuler22', 'openEuler20', 'BigCloud21', 'CentOS8', 'BigCloud8', 'Anolis OS8', 'Kylin Linux Advanced ServerV10'] else 'jemalloc-3.6.0-1.el7.x86_64.rpm' }}"
      when:
        - not (mysql_server__jemalloc_installed | bool)
        - not (mysql_server__jemalloc_repo_available | bool)
        - fcs_mysql_allow_bundled_jemalloc_fallback | bool

    - name: Explain bundled jemalloc fallback
      ansible.builtin.debug:
        msg: "jemalloc is unavailable from configured yum repositories; falling back to bundled {{ mysql_server__jemalloc_rpm_file }}."
      when:
        - not (mysql_server__jemalloc_installed | bool)
        - not (mysql_server__jemalloc_repo_available | bool)
        - fcs_mysql_allow_bundled_jemalloc_fallback | bool

    - name: Copy jemalloc rpm to target server
      ansible.builtin.copy:
        src: "../files/{{ mysql_server__jemalloc_rpm_file }}"
        dest: "/tmp/{{ mysql_server__jemalloc_rpm_file }}"
        mode: '0755'
      when:
        - not (mysql_server__jemalloc_installed | bool)
        - not (mysql_server__jemalloc_repo_available | bool)
        - fcs_mysql_allow_bundled_jemalloc_fallback | bool

    - name: Install jemalloc from local file
      ansible.builtin.yum:
        name: "/tmp/{{ mysql_server__jemalloc_rpm_file }}"
        state: present
        disable_gpg_check: true
      when:
        - not (mysql_server__jemalloc_installed | bool)
        - not (mysql_server__jemalloc_repo_available | bool)
        - fcs_mysql_allow_bundled_jemalloc_fallback | bool

    - name: Fail when jemalloc is requested but unavailable from yum repositories
      ansible.builtin.fail:
        msg: >-
          fcs_mysql_use_jemalloc=true but jemalloc is not installed and not available from configured yum repositories.
          dbbot no longer falls back to the bundled legacy RPM unless
          fcs_mysql_allow_bundled_jemalloc_fallback=true is explicitly set.
      when:
        - not (mysql_server__jemalloc_installed | bool)
        - not (mysql_server__jemalloc_repo_available | bool)
        - not (fcs_mysql_allow_bundled_jemalloc_fallback | bool)
