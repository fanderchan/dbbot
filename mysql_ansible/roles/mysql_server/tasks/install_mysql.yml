- name: Check if MySQL package exists locally(local)
  ansible.builtin.stat:
    path: "{{ mysql_packages_dir }}/{{ mysql_package }}"
  register: mysql_server__package_file
  delegate_to: 127.0.0.1
  become: false

- name: Fail if MySQL package not found (local)
  ansible.builtin.fail:
    msg: "MySQL package not found at {{ mysql_packages_dir }}/{{ mysql_package }}. Please place it before running."
  when: 
    - not mysql_server__package_file.stat.exists
  delegate_to: 127.0.0.1
  become: false

