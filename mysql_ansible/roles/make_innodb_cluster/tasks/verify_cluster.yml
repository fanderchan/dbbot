---
# Verify InnoDB Cluster status

- name: Create cluster status script
  ansible.builtin.template:
    src: cluster_status.js.j2
    dest: /tmp/cluster_status.js
    mode: '0600'
  run_once: true

- name: Check cluster status
  ansible.builtin.command: >
    {{ mysqlsh_path }} --no-wizard --js -f /tmp/cluster_status.js
  register: make_innodb_cluster__status
  run_once: true
  changed_when: false

- name: Display cluster status
  ansible.builtin.debug:
    var: make_innodb_cluster__status.stdout_lines
  run_once: true

- name: Remove status script
  ansible.builtin.file:
    path: /tmp/cluster_status.js
    state: absent
  run_once: true

- name: Verify all members are ONLINE
  ansible.builtin.assert:
    that:
      - "'ONLINE' in make_innodb_cluster__status.stdout"
    fail_msg: "Cluster members are not all ONLINE. Please check cluster status."
    success_msg: "InnoDB Cluster is healthy with all members ONLINE."
  run_once: true
