- name: Ensure mysqlrouter_exporter group exists
  ansible.builtin.group:
    name: "{{ mysqlrouter_exporter_run_group }}"
    state: present

- name: Ensure mysqlrouter_exporter user exists
  ansible.builtin.user:
    name: "{{ mysqlrouter_exporter_run_user }}"
    group: "{{ mysqlrouter_exporter_run_group }}"
    shell: /sbin/nologin
    create_home: false

- name: Ensure mysqlrouter_exporter install directory exists
  ansible.builtin.file:
    path: "{{ mysqlrouter_exporter_install_dir }}"
    state: directory
    owner: "{{ mysqlrouter_exporter_run_user }}"
    group: "{{ mysqlrouter_exporter_run_group }}"
    mode: '0755'

- name: Ensure mysqlrouter_exporter config directory exists
  ansible.builtin.file:
    path: "{{ mysqlrouter_exporter_config_file | dirname }}"
    state: directory
    owner: "{{ mysqlrouter_exporter_run_user }}"
    group: "{{ mysqlrouter_exporter_run_group }}"
    mode: '0755'
