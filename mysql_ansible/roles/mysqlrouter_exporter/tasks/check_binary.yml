- name: Check bundled mysqlrouter_exporter binary on control host
  ansible.builtin.stat:
    path: "{{ role_path }}/files/dbbot/mysqlrouter_exporter"
  register: mysqlrouter_exporter__bundled_binary_stat
  delegate_to: localhost
  become: false

- name: Fail if mysqlrouter_exporter binary is missing on control host
  ansible.builtin.fail:
    msg: >-
      bundled mysqlrouter_exporter binary not found at {{ role_path }}/files/dbbot/mysqlrouter_exporter.
      Refresh the built-in binary from the standalone project's release artifact first.
  when: not mysqlrouter_exporter__bundled_binary_stat.stat.exists
