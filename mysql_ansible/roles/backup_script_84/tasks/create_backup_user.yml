- name: Transfer sql statement to remote
  ansible.builtin.template:
    src: ../templates/create_backup_user.sql.j2
    dest: /tmp/create_backup_user_84.sql
    mode: '0600'

- name: Create backup user
  ansible.builtin.shell: >
    {{ mysql_software_dir }}/bin/mysql -h127.0.0.1 -P{{ mysql_port }} -u{{ mysql_admin_user }} -p'{{ mysql_admin_127_password }}' < /tmp/create_backup_user_84.sql
  changed_when: true

- name: Remove temp file /tmp/create_backup_user_84.sql
  ansible.builtin.file:
    dest: /tmp/create_backup_user_84.sql
    state: absent
