# Verify that master_slave.yml has already run successfully.

- name: Check master_slave_finish.flag exists (MySQL installed by dbbot)
  ansible.builtin.stat:
    path: "{{ datadir }}/master_slave_finish.flag"
  register: make_mha_go__ms_flag

- name: Fail if master_slave_finish.flag is absent
  ansible.builtin.fail:
    msg: "make_mha_go: MySQL not installed by dbbot on {{ inventory_hostname }} - run master_slave.yml first"
  when: not make_mha_go__ms_flag.stat.exists

- name: Verify GTID mode and consistency are ON on all nodes
  ansible.builtin.shell: |
    set -o pipefail
    {{ mysql_software_dir }}/bin/mysql \
      --protocol=socket \
      --socket="{{ socket }}" \
      --user="{{ mysql_admin_user }}" \
      --batch \
      --skip-column-names \
      --execute="SELECT IF(@@GLOBAL.gtid_mode = 'ON' AND @@GLOBAL.enforce_gtid_consistency = 'ON', 'OK', 'BAD')"
  args:
    executable: /bin/bash
  environment:
    MYSQL_PWD: "{{ mysql_admin_127_password }}"
  register: make_mha_go__gtid_check
  changed_when: false
  failed_when: false

- name: Fail if GTID prerequisites are not enabled
  ansible.builtin.fail:
    msg: "make_mha_go: gtid_mode and enforce_gtid_consistency must both be ON on {{ inventory_hostname }}"
  when: make_mha_go__gtid_check.rc != 0 or (make_mha_go__gtid_check.stdout | trim) != "OK"
