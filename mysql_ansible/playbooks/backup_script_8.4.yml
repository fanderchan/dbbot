- name: Deploy MySQL 8.4 clone backup script and configure scheduled task
  hosts: dbbot_mysql
  become: true
  any_errors_fatal: true
  vars_files:
    - default/common_config.yml
    - default/advanced_config.yml
    - default/var_backup_script_8.4.yml
    - common_config.yml
    - advanced_config.yml
    - vars/var_backup_script_8.4.yml
  vars:
    roles_to_execute:
      - "../roles/backup_script_84"
  pre_tasks:
    - name: Import tasks to validate setting in common_config.yml
      ansible.builtin.import_tasks: pre_tasks/validate_common_config_setting.yml

    - name: Import tasks to check os_type and python
      ansible.builtin.import_tasks: pre_tasks/check_os_and_python.yml

    - name: Validate backup script 8.4 settings
      ansible.builtin.import_tasks: pre_tasks/validate_backup_script_8_4.yml

    - name: Import confirmation tasks
      ansible.builtin.import_tasks: pre_tasks/confirmation.yml

  tasks:
    - name: Include backup_script_84 role
      ansible.builtin.include_role:
        name: "../roles/backup_script_84"
