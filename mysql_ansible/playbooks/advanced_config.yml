## dir
mycnf_dir: "{{ mysql_data_dir_base }}/{{ mysql_port }}/etc"
datadir: "{{ mysql_data_dir_base }}/{{ mysql_port }}/data"
tmpdir: "{{ mysql_data_dir_base }}/{{ mysql_port }}/tmp"
binlog_dir: "{{ mysql_data_dir_base }}/{{ mysql_port }}/log"
relaylog_dir: "{{ mysql_data_dir_base }}/{{ mysql_port }}/log"
redolog_dir: "{{ datadir }}"
socket_dir: "{{ datadir }}"
mysqlx_socket_dir: "{{ datadir }}"


auditlog_dir: "{{ mysql_data_dir_base }}/{{ mysql_port }}/log"  # Only applicable for Percona and GreatSQL
slowlog_dir: "{{ mysql_data_dir_base }}/{{ mysql_port }}/log"
errlog_dir: "{{ mysql_data_dir_base }}/{{ mysql_port }}/log"
generallog_dir: "{{ mysql_data_dir_base }}/{{ mysql_port }}/log"

## file
socket: "{{ socket_dir }}/mysql.sock"
mysqlx_socket: "{{ mysqlx_socket_dir }}/mysqlx.sock"

## Package metadata is resolved from `dbbotctl support` after os_type is detected.
mysql_package: ""
mysql_package_download_url: ""
mysql_package_checksum_type: "none"
mysql_package_checksum: "-"
mysql_custom_package: ""
mysql_custom_package_download_url: ""
