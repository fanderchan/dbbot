## dir
mycnf_dir: "{{ mysql_data_dir_base }}/etc/{{ mysql_port }}"
datadir: "{{ mysql_data_dir_base }}/data/{{ mysql_port }}"
tmpdir: "{{ mysql_data_dir_base }}/tmp/{{ mysql_port }}"
binlog_dir: "{{ mysql_data_dir_base }}/log/binlog/{{ mysql_port }}"
relaylog_dir: "{{ mysql_data_dir_base }}/log/relaylog/{{ mysql_port }}"
redolog_dir: "{{ mysql_data_dir_base }}/log/redolog/{{ mysql_port }}"
socket_dir: "{{ datadir }}"
mysqlx_socket_dir: "{{ datadir }}"


auditlog_dir: "{{ datadir }}"  # Only applicable for Percona and GreatSQL
slowlog_dir: "{{ datadir }}"
errlog_dir: "{{ datadir }}"
generallog_dir: "{{ datadir }}"

## file
socket: "{{ socket_dir }}/mysql.sock"
mysqlx_socket: "{{ mysqlx_socket_dir }}/mysqlx.sock"

## do not modify
mysql_linux_glibc_tag: >-
  {%- if mysql_version.startswith('5.') -%}
  glibc2.12
  {%- elif (os_type | default('')) in ['Rocky9'] -%}
  glibc2.28
  {%- else -%}
  glibc2.17
  {%- endif -%}
mysql_linux_archive_suffix: >-
  {%- if mysql_version.startswith('5.') -%}
  .tar.gz
  {%- elif (os_type | default('')) in ['Rocky9'] -%}
  .tar.xz
  {%- else -%}
  -minimal.tar.xz
  {%- endif -%}
mysql_package: "{% if db_type == 'mysql' %}{{ 'mysql-' + mysql_version + '-linux-' + mysql_linux_glibc_tag + '-x86_64' + mysql_linux_archive_suffix }}{% elif db_type == 'percona' %}{{ percona_package }}{% elif db_type == 'greatsql' %}{{ greatsql_package }}{% endif %}"
greatsql_package: "GreatSQL-{{ mysql_version }}-Linux-glibc2.17-x86_64-minimal.tar.xz"  # dont modifiy
percona_package: Percona-Server-8.0.29-21-Linux.x86_64.glibc2.17.tar.gz
