# vars loading order: common_config -> default/var_mha_go.yml -> this file
# Adjust the values below for your environment.

master_ip: 192.0.2.131
slave_ips:
  - 192.0.2.132
  - 192.0.2.133
sub_nets: "192.0.2.%"

# manager defaults to the primary/control node. Change if you want a different
# MySQL node to run `mha manager`.
manager_ip: "{{ master_ip }}"

# Cluster name shown in `mha check-repl` output and log lines
mha_go_cluster_name: app1

# dbbot master_slave.yml is pure async by default. Use preferred/required only
# after MySQL semi-sync plugins are installed and enabled.
mha_go_semi_sync_policy: disabled
mha_go_semi_sync_wait_for_replica_count: 0
mha_go_semi_sync_timeout: 5s
mha_go_salvage_policy: salvage-if-possible
mha_go_salvage_timeout: 30s

# --- Writer endpoint ---
# Uncomment and fill to enable VIP failover script.
# mha_go_writer_endpoint_enabled: true
# vip: 192.0.2.130
# vip_netmask: "32"
# net_work_interface: "ens33"
