# vars loading order: common_config -> this file
# ============================================================
# MySQL Router Exporter
# ============================================================
mysqlrouter_exporter_install: true
mysqlrouter_exporter_install_type: dbbot   # dbbot, package
mysqlrouter_exporter_version: "0.0.1"
mysqlrouter_exporter_package: "mysqlrouter_exporter_{{ mysqlrouter_exporter_version }}_linux_amd64.tar.gz"
mysqlrouter_exporter_url: "https://github.com/fanderchan/mysqlrouter_exporter/releases/download/v{{ mysqlrouter_exporter_version }}/{{ mysqlrouter_exporter_package }}"
mysqlrouter_exporter_port: 9165
mysqlrouter_exporter_listen_address: 0.0.0.0
mysqlrouter_exporter_metrics_path: /metrics
mysqlrouter_exporter_api_base_url: "https://127.0.0.1:8443/api/20190715"
mysqlrouter_exporter_api_user: router_api_user
mysqlrouter_exporter_api_password: "Dbbot_{{ router_rest_api_file_user | default('router_api_user') }}@8888"
mysqlrouter_exporter_timeout_seconds: 5
mysqlrouter_exporter_insecure_skip_verify: true
mysqlrouter_exporter_collect_route_connections: true
mysqlrouter_exporter_router_config_file: /var/lib/mysqlrouter/mysqlrouter.conf
mysqlrouter_exporter_listener_check_enabled: true
mysqlrouter_exporter_listener_check_timeout_seconds: 1
