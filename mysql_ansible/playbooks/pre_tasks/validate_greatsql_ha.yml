- name: Check if greatsql_vip are valid
  ansible.builtin.fail:
    msg: "{{ ansible_play_name }}: `greatsql_vip` is undefined or not valid"
  when: not ((greatsql_vip | default('')) is regex("^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$"))

- name: Check if greatsql_netmask is valid
  ansible.builtin.fail:
    msg: "{{ ansible_play_name }}: `greatsql_netmask` is not valid. It should be between 0 and 32."
  when: greatsql_netmask is not defined or greatsql_netmask | int < 0 or greatsql_netmask | int > 32

- name: Check if greatsql_net_work_interface is valid
  ansible.builtin.fail:
    msg: "The greatsql_net_work_interface is not valid or not found in the network interfaces list"
  when: (greatsql_net_work_interface | default('')) not in ansible_interfaces
