---
- name: Display Router uninstall impact
  ansible.builtin.debug:
    msg:
      - "Hosts to be affected by {{ ansible_play_name }}: {{ play_hosts | join(', ') }}"
      - "Roles to be executed: {{ roles_to_execute | join(', ') }}"
      - "Router service name: {{ router_service_name | default('mysqlrouter') }}"
      - "Router base dir: {{ router_base_dir | default('/usr/local/mysqlrouter') }}"
      - "Router config dir: {{ router_config_dir | default('/etc/mysqlrouter') }}"
      - "Router data dir: {{ router_data_dir | default('/var/lib/mysqlrouter') }}"
      - "Router log dir: {{ router_log_dir | default('/var/log/mysqlrouter') }}"
      - "Remove keepalived assets: {{ router_uninstall_remove_keepalived | default(false) }}"
      - "Remove keepalived package: {{ router_uninstall_remove_keepalived_package | default(false) }}"
      - "Remove Router Linux user/group: {{ router_uninstall_remove_user | default(false) }}"
      - "This operation stops MySQL Router and removes Router service files, binaries, configuration, data, logs, and runtime directories from the target Router hosts."
  run_once: true
  delegate_to: localhost
  become: false

- name: Prompt user for confirmation
  ansible.builtin.pause:
    prompt: "This will perform {{ ansible_play_name }} on the displayed hosts. Please type 'confirm' to continue or press Ctrl+C to cancel."
  register: confirmation
  run_once: true
  delegate_to: localhost
  become: false
  when: dbbot_confirmation_input | default('') == ''

- name: Preseed confirmation for non-interactive execution
  ansible.builtin.set_fact:
    confirmation:
      user_input: "{{ dbbot_confirmation_input }}"
  when: dbbot_confirmation_input | default('') != ''

- name: Check if user confirmed
  ansible.builtin.fail:
    msg: "{{ ansible_play_name }} not confirmed, exiting."
  when: confirmation.user_input != 'confirm'
