- name: Check if each ip in mysql_mgr_hosts is valid
  ansible.builtin.fail:
    msg: "{{ ansible_play_name }}: `mysql_mgr_hosts` is undefined or not valid"
  loop: "{{ mysql_mgr_hosts | default([]) }}"
  when: not (item is regex("^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$"))

- name: Check if mgr.yml 's IP are in inventory/hosts.ini
  ansible.builtin.fail:
    msg: "{{ ansible_play_name }}: mgr.yml 's IP `{{ item }}` is not in inventory/hosts.ini"
  when: item not in ansible_play_hosts
  loop: "{{ mysql_mgr_hosts }}"

- name: Check if inventory/hosts.ini 's IP are in mgr.yml
  ansible.builtin.fail:
    msg: "{{ ansible_play_name }}: inventory/hosts.ini's IP `{{ item }}` is not in mgr.yml"
  when: item not in mysql_mgr_hosts
  loop: "{{ ansible_play_hosts }}"

- name: MGR only support [3 ~ 9] instance
  ansible.builtin.fail:
    msg: "Invalid number of elements in mysql_mgr_hosts list"
  when: "mysql_mgr_hosts | length not in [3, 4, 5, 6, 7, 8, 9]"

- name: Validate GreatSQL arbitrator var
  ansible.builtin.import_tasks: validate_greatsql_arbitrator.yml
  when: db_type == 'greatsql' and greatsql_group_replication_arbitrator

- name: Validate GreatSQL HA var
  ansible.builtin.import_tasks: validate_greatsql_ha.yml
  when: db_type == 'greatsql' and fcs_use_greatsql_ha
