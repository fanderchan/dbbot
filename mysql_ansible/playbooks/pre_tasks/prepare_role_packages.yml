---
# Ensure packages required by selected roles are ready on the control host

- name: Ensure downloads directory exists when packages are needed (local)
  ansible.builtin.file:
    path: "{{ mysql_packages_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true
  when: >
    '../roles/mysql_server' in roles_to_execute
    or '../roles/setup_mysqlshell' in roles_to_execute
    or '../roles/mysql_router' in roles_to_execute

- name: Prepare MySQL Server package on control host
  when: "'../roles/mysql_server' in roles_to_execute"
  delegate_to: localhost
  run_once: true
  vars:
    prepare_mysql_package_url: >-
      {{
        'https://dev.mysql.com/get/Downloads/MySQL-' ~ mysql_version[0:3] ~ '/' ~ mysql_package
        if db_type == 'mysql'
        else (
          'https://product.greatdb.com/' ~ 'GreatSQL-' ~ mysql_version ~ ('-Rapid' if mysql_version == '8.0.32-25' else '') ~ '/' ~ mysql_package
          if db_type == 'greatsql'
          else ''
        )
      }}
  block:
    - name: Ensure MySQL Server package archive is ready (local)
      ansible.builtin.import_tasks: ../roles/common_utils/tasks/ensure_local_tar_archive_ready.yml
      vars:
        local_tar_archive_label: "MySQL package {{ mysql_package }}"
        local_tar_archive_path: "{{ mysql_packages_dir }}/{{ mysql_package }}"
        local_tar_archive_auto_download: "{{ fcs_auto_download_packages | bool }}"
        local_tar_archive_url: "{{ prepare_mysql_package_url }}"
        local_tar_archive_timeout: 30
        local_tar_archive_headers:
          User-Agent: "Wget/1.21.1"

- name: Prepare MySQL Shell package on control host
  when: "'../roles/setup_mysqlshell' in roles_to_execute"
  delegate_to: localhost
  run_once: true
  vars:
    prepare_mysqlshell_package: "{{ mysqlshell_package | default('mysql-shell-' + (mysqlshell_version | default(mysql_version)) + '-linux-glibc2.17-x86-64bit.tar.gz') }}"
    prepare_mysqlshell_dir: "{{ mysqlshell_packages_dir | default(mysql_packages_dir) }}"
  block:
    - name: Ensure MySQL Shell package archive is ready (local)
      ansible.builtin.import_tasks: ../roles/common_utils/tasks/ensure_local_tar_archive_ready.yml
      vars:
        local_tar_archive_label: "MySQL Shell package {{ prepare_mysqlshell_package }}"
        local_tar_archive_path: "{{ prepare_mysqlshell_dir }}/{{ prepare_mysqlshell_package }}"
        local_tar_archive_auto_download: "{{ fcs_auto_download_packages | bool }}"
        local_tar_archive_url: "https://cdn.mysql.com/Downloads/MySQL-Shell/{{ prepare_mysqlshell_package }}"
        local_tar_archive_timeout: 300

- name: Prepare MySQL Router package on control host
  when: "'../roles/mysql_router' in roles_to_execute"
  delegate_to: localhost
  run_once: true
  vars:
    prepare_router_package: "{{ router_package | default('mysql-router-' + (router_version | default(mysql_version)) + '-linux-glibc2.17-x86_64.tar.xz') }}"
    prepare_router_dir: "{{ router_packages_dir | default(mysql_packages_dir) }}"
  block:
    - name: Ensure MySQL Router package archive is ready (local)
      ansible.builtin.import_tasks: ../roles/common_utils/tasks/ensure_local_tar_archive_ready.yml
      vars:
        local_tar_archive_label: "MySQL Router package {{ prepare_router_package }}"
        local_tar_archive_path: "{{ prepare_router_dir }}/{{ prepare_router_package }}"
        local_tar_archive_auto_download: "{{ fcs_auto_download_packages | bool }}"
        local_tar_archive_url: "https://cdn.mysql.com/Downloads/MySQL-Router/{{ prepare_router_package }}"
        local_tar_archive_timeout: 300
