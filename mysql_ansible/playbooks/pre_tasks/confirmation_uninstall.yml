- name: Display the list of target hosts and additional information
  ansible.builtin.debug:
    msg: "{{ base_msg
            + master_ip_msg + slave_ips_msg + vip_msg + manager_ip_msg
            + mysqld_exporter_port_msg + mysqld_exporter_install_type_msg + mysqld_exporter_package_msg + mysqld_exporter_install_dir_msg
            + node_exporter_port_msg + node_exporter_install_type_msg + node_exporter_package_msg + node_exporter_install_dir_msg
            + datadir_msg + tmpdir_msg + binlog_dir_msg + relaylog_dir_msg + redolog_dir_msg
            + [note] }}"
  run_once: true
  delegate_to: localhost
  become: false
  vars:
    base_msg:
      - "Hosts to be affected by {{ ansible_play_name }}: {{ play_hosts | join(', ') }}"
      - "DB type: {{ db_type }}"
      - "MySQL port: {{ mysql_port }}"
      - "MySQL service name: {{ mysql_service_name }}"
      - "MySQL version: {{ mysql_version }}"
      - "Server specs: {{ server_specs }}"
      - "Roles to be executed: {{ roles_to_execute | join(', ') }}"
    # master, slave, VIP, manager info
    master_ip_msg: "{% if master_ip is defined %}[\"Master IP: {{ master_ip }}\"]{% else %}[]{% endif %}"
    slave_ips_msg: "{% if slave_ips is defined %}[\"Slave IPs: {{ slave_ips | join(', ') }}\"]{% else %}[]{% endif %}"
    vip_msg: "{% if vip is defined %}[\"VIP: {{ vip }}\"]{% else %}[]{% endif %}"
    manager_ip_msg: "{% if manager_ip is defined %}[\"Manager IP: {{ manager_ip }}\"]{% else %}[]{% endif %}"
    # mysqld_exporter messages
    mysqld_exporter_port_msg: "{% if mysqld_exporter_install | default(false) | bool and mysqld_exporter_port is defined %}[\"mysqld_exporter port: {{ mysqld_exporter_port_resolved | int }}{% if (mysqld_exporter_port | string) == 'auto' %} (auto){% endif %}\"]{% else %}[]{% endif %}"
    mysqld_exporter_install_type_msg: "{% if mysqld_exporter_install | default(false) | bool and mysqld_exporter_install_type is defined %}[\"mysqld_exporter install type: {{ mysqld_exporter_install_type }}\"]{% else %}[]{% endif %}"
    mysqld_exporter_package_msg: "{% if mysqld_exporter_install | default(false) | bool and (mysqld_exporter_install_type | default('dbbot')) == 'package' and (mysqld_exporter_package is defined) %}[\"mysqld_exporter package: {{ mysqld_exporter_package }}\"]{% else %}[]{% endif %}"
    mysqld_exporter_install_dir_msg: "{% if mysqld_exporter_install | default(false) | bool and mysqld_exporter_install_dir is defined %}[\"mysqld_exporter install dir: {{ mysqld_exporter_install_dir }}\"]{% else %}[]{% endif %}"
    # node_exporter messages
    node_exporter_port_msg: "{% if node_exporter_install | default(false) | bool and node_exporter_port is defined %}[\"node_exporter port: {{ node_exporter_port }}\"]{% else %}[]{% endif %}"
    node_exporter_install_type_msg: "{% if node_exporter_install | default(false) | bool and node_exporter_install_type is defined %}[\"node_exporter install type: {{ node_exporter_install_type }}\"]{% else %}[]{% endif %}"
    node_exporter_package_msg: "{% if node_exporter_install | default(false) | bool and (node_exporter_install_type | default('dbbot')) == 'package' and node_exporter_package is defined %}[\"node_exporter package: {{ node_exporter_package }}\"]{% else %}[]{% endif %}"
    node_exporter_install_dir_msg: "{% if node_exporter_install | default(false) | bool and node_exporter_install_dir is defined %}[\"node_exporter install dir: {{ node_exporter_install_dir }}\"]{% else %}[]{% endif %}"
    # Additional MySQL directory messages
    datadir_msg: "{% if datadir is defined %}[\"datadir: {{ datadir }}\"]{% else %}[]{% endif %}"
    tmpdir_msg: "{% if tmpdir is defined %}[\"tmpdir: {{ tmpdir }}\"]{% else %}[]{% endif %}"
    binlog_dir_msg: "{% if binlog_dir is defined %}[\"binlog_dir: {{ binlog_dir }}\"]{% else %}[]{% endif %}"
    relaylog_dir_msg: "{% if relaylog_dir is defined %}[\"relaylog_dir: {{ relaylog_dir }}\"]{% else %}[]{% endif %}"
    redolog_dir_msg: "{% if redolog_dir is defined %}[\"redolog_dir: {{ redolog_dir }}\"]{% else %}[]{% endif %}"
    note: >-
      This script is unsafe because dbbot supports custom data and log paths.
      It removes the configured datadir, tmpdir, binlog_dir, relaylog_dir, and
      redolog_dir for the target instance. With the default layout, that
      removes both the instance data and log directories. It does not remove
      the MySQL software base directory or binaries, the Linux user, or my.cnf.
      Validate the exact impact against your configuration in a test
      environment before considering any production use.


- name: Prompt user for confirmation
  ansible.builtin.pause:
    prompt: "This will perform {{ ansible_play_name }} on the displayed hosts. Please type 'confirm' to continue or press Ctrl+C to cancel."
  register: confirmation
  run_once: true
  delegate_to: localhost
  become: false
  when: dbbot_confirmation_input | default('') == ''

- name: Preseed confirmation for non-interactive execution
  ansible.builtin.set_fact:
    confirmation:
      user_input: "{{ dbbot_confirmation_input }}"
  when: dbbot_confirmation_input | default('') != ''

- name: Check if user confirmed
  ansible.builtin.fail:
    msg: "{{ ansible_play_name }} not confirmed, exiting."
  when: confirmation.user_input != 'confirm'
