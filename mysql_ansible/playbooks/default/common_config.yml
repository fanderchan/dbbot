## In most cases, just adjust these two parameters.
mysql_version: "9.7.0"
mysql_port: 3306

# The 'server_specs' variable defines the hardware specifications for the server deployment.
# - If set to "auto", the script will automatically fetch and use the server's current hardware specifications.
# - If set to a specific value like "4c8g", the script will deploy the server based on these specifications (4 cores and 8GB RAM in this example).
# Example usage:
# server_specs: "auto"
# server_specs: "4c8g"

server_specs: "auto" 

## DB TYPE,suport mysql,percona,greatsql
db_type: mysql

# Directory of MySQL installation package
mysql_packages_dir: ../downloads/

## linux mysql run user name
mysql_user: mysql
mysql_group: mysql
mysql_user_password: "Dbbot_{{ mysql_user }}@9999"

## mysql install directory
mysql_software_dir: "/database/{{ db_type }}/base/{{ mysql_version }}"

## mysql_data_dir_base defines the base path for instance storage. By default,
## the real datadir is mysql_data_dir_base + /port/data, but advanced_config.yml
## can override the final layout.
mysql_data_dir_base: "/database/{{ db_type }}"

## mysql service name
mysql_service_name: "mysql{{ mysql_port }}"

## The password needs to meet the password complexity requirements
## Complexity requirements: at least 8 digits, including numbers, upper and lower case letters, and special symbols.
## Open-source default passwords use the Dbbot_<user>@8888 / @9999 convention.
## For safety, deployment blocks these public defaults unless fcs_allow_dbbot_default_passwd=true.
mysql_admin_user: admin
mysql_admin_password: "Dbbot_{{ mysql_admin_user }}@8888"
mysql_admin_127_password: "{{ mysql_admin_password }}"
mysql_rple_user: repl
mysql_rple_password: "Dbbot_{{ mysql_rple_user }}@8888"
mysql_mha_user: mha
mysql_mha_password: "Dbbot_{{ mysql_mha_user }}@8888"
mysql_backup_user: backup
mysql_backup_password: "Dbbot_{{ mysql_backup_user }}@8888"
mysql_backup_user_hosts:
  - "127.0.0.1"
  - "192.0.2.%"
mysql_mgr_user: repl
mysql_mgr_password: "Dbbot_{{ mysql_mgr_user }}@8888"
mysql_monitor_user: monitor      # mysqld_exporter use it
mysql_monitor_password: "Dbbot_{{ mysql_monitor_user }}@8888"
mysql_kha_user: kha
mysql_kha_password: "Dbbot_{{ mysql_kha_user }}@8888"

## InnoDB Cluster accounts
# Cluster admin account (for mysqlsh operations)
mysql_cluster_admin_user: clusteradmin
mysql_cluster_admin_password: "Dbbot_{{ mysql_cluster_admin_user }}@8888"
innodb_cluster_admin_user_sub_net: "1%"

# Note: Group Replication internal accounts (mysql_innodb_cluster_*) are
# automatically created by MySQL Shell. Do NOT manually modify them.
innodb_cluster_replication_allowed_host: "1%"

# MySQL Router account (for Router to read cluster metadata)
mysql_router_user: mysqlrouter
mysql_router_password: "Dbbot_{{ mysql_router_user }}@8888"
innodb_cluster_router_user_sub_net: "1%"

## mysql my.cnf
mysql_binlog_format: row
mysql_innodb_log_buffer_size: 64M
mysql_innodb_open_files: 65535
mysql_max_connections: 1000
mysql_thread_cache_size: 256
mysql_character_set_server: utf8mb4
mysql_transaction_isolation: READ-COMMITTED
mysql_default_time_zone: "+8:00"
mysql57_innodb_log_files_in_group: 16
mysql57_innodb_log_file_size: 256M
use_write_set: 1
mgr_use_random_uuid: 1

## Feature Control Switch
fcs_skip_db_mount_verification: true
fcs_skip_check_ntpd_or_chrony_running: true
fcs_auto_download_packages: true   # Controls pre-task internet download for MySQL Server/Shell/Router/Exporter packages; place manually if disabled
fcs_allow_dbbot_default_passwd: false
fcs_create_mysql_fast_login: true
fcs_backup_script_create_backup_user: true
fcs_role_mysqld_exporter_create_monitor_user: true
# Keep the system default allocator by default.
# Set to true only when you explicitly want jemalloc preload for this host/workload.
fcs_mysql_use_jemalloc: false
# When jemalloc is enabled, prefer the OS repository package first.
# Only set to true if you explicitly allow dbbot to fall back to the bundled legacy RPM.
fcs_mysql_allow_bundled_jemalloc_fallback: false
fcs_use_greatsql_ha: true
fcs_mysql_fast_login_have_prompt: true
fcs_run_post_deploy_checks: true
dbbot_confirmation_input: ""   # Set to "confirm" only for non-interactive automation; keep empty for manual confirmation.

## Feature Control Switch vars
fcs_create_mysql_fast_login_name: db{{ mysql_port }}
dbbot_post_check_enabled: "{{ fcs_run_post_deploy_checks }}"
dbbot_post_check_wait_timeout: 60
dbbot_post_check_retries: 12
dbbot_post_check_delay: 5
dbbot_post_check_replication_max_lag_seconds: 0
