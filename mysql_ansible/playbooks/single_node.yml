- name: Deploy single-node MySQL server using binary installation
  hosts: dbbot_mysql
  become: true
  any_errors_fatal: true
  vars_files:
    - default/common_config.yml
    - default/advanced_config.yml
    - default/var_single_node.yml
    - common_config.yml
    - advanced_config.yml
    - vars/var_single_node.yml
  vars:
    dbbot_entry_playbook_name: "single_node.yml"
    roles_to_execute:
      - "../roles/pre_check_and_set"
      - "../roles/mysql_server"
    mtls_with_mysql_group_replication: 0
    roles_precheckandset_check_networkcardnames: 1
  pre_tasks:
    - name: Import tasks to validate setting in common_config.yml
      ansible.builtin.import_tasks: pre_tasks/validate_common_config_setting.yml
    - name: Import tasks to check os_type and python
      ansible.builtin.import_tasks: pre_tasks/check_os_and_python.yml
    - name: Import tasks to ensure tar exists on control host
      ansible.builtin.import_tasks: pre_tasks/ensure_control_host_tar.yml
    - name: Import tasks to prepare required packages
      ansible.builtin.import_tasks: pre_tasks/prepare_role_packages.yml
    - name: Import tasks to check if packages exist
      ansible.builtin.import_tasks: pre_tasks/check_if_packages_exist.yml
    - name: Import confirmation tasks
      ansible.builtin.import_tasks: pre_tasks/confirmation.yml
  tasks:
    - name: Include role
      ansible.builtin.include_role:
        name: "{{ role_name }}"
      loop: "{{ roles_to_execute }}"
      loop_control:
        loop_var: role_name
