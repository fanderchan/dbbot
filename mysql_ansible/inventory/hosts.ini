192.0.2.133 ansible_user=root ansible_ssh_pass="'<your_ssh_password>'"

[dbbot_sysbench]
192.0.2.171 ansible_user=root ansible_ssh_pass="'<your_ssh_password>'"

# InnoDB Cluster MySQL nodes (at least 3)
[dbbot_innodb_cluster]
192.0.2.131 ansible_user=root ansible_ssh_pass="'<your_ssh_password>'"
192.0.2.132 ansible_user=root ansible_ssh_pass="'<your_ssh_password>'"
192.0.2.133 ansible_user=root ansible_ssh_pass="'<your_ssh_password>'"

# Router (App mode by default; enable HA with router_enable_ha=true)
