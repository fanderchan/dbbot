- name: Ensure Alertmanager package archive is ready (local)
  ansible.builtin.import_tasks: ../../common_utils/tasks/ensure_local_tar_archive_ready.yml
  vars:
    local_tar_archive_label: "Alertmanager package {{ alertmanager_package }}"
    local_tar_archive_path: "{{ packages_dir }}/{{ alertmanager_package }}"
    local_tar_archive_auto_download: "{{ fcs_auto_download | bool }}"
    local_tar_archive_url: "{{ alertmanager_url }}"
    local_tar_archive_timeout: 30
    local_tar_archive_headers:
      User-Agent: "Wget/1.21.1"
